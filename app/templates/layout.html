<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}CV LaTeX Builder{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='/css/app.css') }}">
  <script defer src="{{ url_for('static', path='/js/app.js') }}"></script>
</head>
<body>
  <header class="site-header">
    <div class="container header-content">
      <a class="brand" href="{{ url_for('dashboard') }}">CV LaTeX Builder</a>
      <nav class="header-nav" aria-label="Navegacion principal">
        <a href="{{ url_for('dashboard') }}">Dashboard</a>
        <a href="{{ url_for('cvs_list') }}">CVs</a>
        <a href="{{ url_for('cover_letters_list') }}">Cartas</a>
        <a href="{{ url_for('applications_list') }}">Postulaciones</a>
        <a href="{{ url_for('ats_index') }}">ATS</a>
        <a href="{{ url_for('documentation_index') }}">Documentacion</a>
      </nav>
      <span class="version">v{{ request.app.version }}</span>
    </div>
  </header>

  <main class="container main-content">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
