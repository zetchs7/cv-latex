services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cv_latex_app
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DATA_DIR: /data
      APP_DB_FILENAME: ${APP_DB_FILENAME:-app.db}
      APP_VERSION: ${APP_VERSION:-0.4.1}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
